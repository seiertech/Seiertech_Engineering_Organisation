name: EMS Mission Chain

# HONEST STATUS (see IMPLEMENTATION_STATUS.md for full ledger):
# v2 — intake chain (brownfield, MISSION-001) does: real shallow clone + file
# walk (scan_repo.py), 5 grouped persona passes, MTS synthesis, and a REAL
# deterministic readiness gate check (check_readiness_gates.py) — not an
# LLM self-assessment. Sets DRAFT/READY status based on actual gate results.
#
# v1 — genesis chain (greenfield, MISSION-000) added after a brownfield/
# greenfield simulation exercise found and fixed two real bugs: (1) the
# gate checker only recognised brownfield evidence files, which meant a
# greenfield platform could never reach READY regardless of completeness;
# (2) the issue parser extracted the genesis 'brief' field but never wrote
# it to GITHUB_OUTPUT, so the workflow had no way to receive it. Both fixed
# before this job went live. Genesis does 3 grouped DESIGN-mode persona
# passes (fewer than intake's 5, since there's no repo to scan) + MTS
# synthesis + the same real gate check used for brownfield.
#
# STILL NOT DONE: full 25-persona individual depth for either chain, .ems/
# creation in the TARGET platform repo (brownfield) or actual GitHub repo
# creation for the new platform (greenfield) — both need additional token
# scope, Founder Questions mechanism (RG-008, both origins), and all Team 2
# forward mission executors (BUILD/REHAB/STRATEGIC/etc).

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  detect-mission:
    runs-on: ubuntu-latest
    outputs:
      mission_type: ${{ steps.parse.outputs.mission_type }}
      platform_name: ${{ steps.parse.outputs.platform_name }}
      repo_url: ${{ steps.parse.outputs.repo_url }}
      issue_number: ${{ github.event.issue.number }}

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse issue deterministically
        id: parse
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 .github/scripts/issue_parser.py \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --output-file parsed_mission.json

      - name: Fail loudly if mission type is ambiguous
        if: steps.parse.outputs.mission_type == 'AMBIGUOUS'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Could not deterministically parse this issue as a known mission type.\n\nExpected formats:\n- `Complete intake for [NAME] — repo: [URL]`\n- `Genesis: [NAME] — [brief]`\n\nNo chain has been activated. Please reformat and reopen, or edit this issue."
            })

  execute-intake:
    needs: detect-mission
    if: needs.detect-mission.outputs.mission_type == 'INTAKE'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Label issue as intake mission
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['mission:intake', 'status:in-progress', 'chain:v2']
            })

      - name: Run Team 1 intake chain (v2 — real scan + 5 passes + gate check)
        id: intake
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/run_intake_chain.py \
            --platform-name "${{ needs.detect-mission.outputs.platform_name }}" \
            --repo-url "${{ needs.detect-mission.outputs.repo_url }}" \
            --issue-number "${{ needs.detect-mission.outputs.issue_number }}" \
            2>&1 | tee intake_run_output.log

      - name: Read gate check result
        id: gates
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
        run: |
          GATE_FILE="platforms/${PLATFORM_NAME}/READINESS_GATE_RESULT.json"
          if [ -f "$GATE_FILE" ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('$GATE_FILE')).get('overall_status','UNKNOWN'))")
            FAILING=$(python3 -c "import json; print(','.join(json.load(open('$GATE_FILE')).get('failing_gates',[])))")
          else
            STATUS="UNKNOWN — gate check did not run"
            FAILING="N/A"
          fi
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          echo "failing=${FAILING}" >> $GITHUB_OUTPUT

      - name: Commit artefacts
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          ISSUE_NUMBER: ${{ needs.detect-mission.outputs.issue_number }}
          GATE_STATUS: ${{ steps.gates.outputs.status }}
        run: |
          git config user.name "SeierTech EMS"
          git config user.email "ems@seiertech.com"
          git add "platforms/${PLATFORM_NAME}" || true
          git commit -m "EMS: v2 intake run for ${PLATFORM_NAME} [Issue #${ISSUE_NUMBER}] — gate status: ${GATE_STATUS}" || echo "Nothing to commit"
          git push

      - name: Comment honest status on issue
        uses: actions/github-script@v7
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          GATE_STATUS: ${{ steps.gates.outputs.status }}
          FAILING_GATES: ${{ steps.gates.outputs.failing }}
        with:
          script: |
            const platformName = process.env.PLATFORM_NAME;
            const gateStatus = process.env.GATE_STATUS;
            const failingGates = process.env.FAILING_GATES;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              body: `## EMS v2 Intake Chain — Result\n\n**Platform:** ${platformName}\n**Readiness Status:** ${gateStatus}\n**Failing/incomplete gates:** ${failingGates}\n\nThis ran the v2 chain: real shallow clone + file walk, 5 grouped persona passes, MTS synthesis, and a real deterministic readiness gate check (not LLM self-assessment). See \`platforms/${platformName}/INTAKE_RUN_LOG.md\` and \`READINESS_GATE_RESULT.json\` for full detail.\n\nKnown gaps (RG-008 Founder Questions, .ems/ creation in target repo, full 25-persona depth) are tracked in IMPLEMENTATION_STATUS.md and will correctly show as N/A or failing rather than being silently skipped.\n\n*SeierTech EMS — Loop Engineering*`
            })

      - name: Update status label
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ needs.detect-mission.outputs.issue_number }},
                name: 'status:in-progress'
              });
            } catch (e) { console.log('Label removal skipped:', e.message); }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['status:draft-needs-review']
            });

  execute-genesis:
    needs: detect-mission
    if: needs.detect-mission.outputs.mission_type == 'GENESIS'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Label issue as genesis mission
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['mission:genesis', 'status:in-progress', 'chain:v1']
            })

      - name: Run Team 2 genesis chain (v1)
        id: genesis
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
        run: |
          python3 .github/scripts/run_genesis_chain.py \
            --platform-name "${{ needs.detect-mission.outputs.platform_name }}" \
            --brief "${{ needs.detect-mission.outputs.brief }}" \
            --issue-number "${{ needs.detect-mission.outputs.issue_number }}" \
            2>&1 | tee genesis_run_output.log

      - name: Read gate check result
        id: gates
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
        run: |
          GATE_FILE="platforms/${PLATFORM_NAME}/READINESS_GATE_RESULT.json"
          if [ -f "$GATE_FILE" ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('$GATE_FILE')).get('overall_status','UNKNOWN'))")
            FAILING=$(python3 -c "import json; print(','.join(json.load(open('$GATE_FILE')).get('failing_gates',[])))")
          else
            STATUS="UNKNOWN — gate check did not run"
            FAILING="N/A"
          fi
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          echo "failing=${FAILING}" >> $GITHUB_OUTPUT

      - name: Commit artefacts
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          ISSUE_NUMBER: ${{ needs.detect-mission.outputs.issue_number }}
          GATE_STATUS: ${{ steps.gates.outputs.status }}
        run: |
          git config user.name "SeierTech EMS"
          git config user.email "ems@seiertech.com"
          git add "platforms/${PLATFORM_NAME}" || true
          git commit -m "EMS: v1 genesis run for ${PLATFORM_NAME} [Issue #${ISSUE_NUMBER}] — gate status: ${GATE_STATUS}" || echo "Nothing to commit"
          git push

      - name: Comment honest status on issue
        uses: actions/github-script@v7
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          GATE_STATUS: ${{ steps.gates.outputs.status }}
          FAILING_GATES: ${{ steps.gates.outputs.failing }}
        with:
          script: |
            const platformName = process.env.PLATFORM_NAME;
            const gateStatus = process.env.GATE_STATUS;
            const failingGates = process.env.FAILING_GATES;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              body: `## EMS v1 Genesis Chain — Result\n\n**Platform:** ${platformName}\n**Origin:** MISSION-000 Platform Genesis (greenfield — designed forward from brief, no prior codebase)\n**Readiness Status:** ${gateStatus}\n**Failing/incomplete gates:** ${failingGates}\n\nThis ran the v1 genesis chain: 3 grouped DESIGN-mode persona passes, MTS synthesis, and the same real deterministic readiness gate check used for brownfield intake. See \`platforms/${platformName}/GENESIS_RUN_LOG.md\` and \`READINESS_GATE_RESULT.json\` for full detail.\n\nKnown gaps (RG-008 Founder Questions, no actual GitHub repo created yet, full 25-persona depth) are tracked in IMPLEMENTATION_STATUS.md.\n\n*SeierTech EMS — Loop Engineering*`
            })

      - name: Update status label
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ needs.detect-mission.outputs.issue_number }},
                name: 'status:in-progress'
              });
            } catch (e) { console.log('Label removal skipped:', e.message); }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['status:draft-needs-review']
            });

name: EMS Mission Chain

# HONEST STATUS (see .github/scripts/run_intake_chain.py header):
# This workflow executes a v1 REDUCED intake chain — grouped persona passes,
# Standards Engineer gated, real files written to platforms/[NAME]/.
# It does NOT yet execute the full 25-persona Team 1 sequence individually,
# does NOT yet perform deep code scanning, and does NOT yet create .ems/
# in the TARGET platform repo (cross-repo write — requires additional token
# scope and is flagged as a follow-up, not done here).
# Treat all v1 intake output as DRAFT requiring human review before READY.

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  detect-mission:
    runs-on: ubuntu-latest
    outputs:
      mission_type: ${{ steps.parse.outputs.mission_type }}
      platform_name: ${{ steps.parse.outputs.platform_name }}
      repo_url: ${{ steps.parse.outputs.repo_url }}
      issue_number: ${{ github.event.issue.number }}

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse issue deterministically
        id: parse
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 .github/scripts/issue_parser.py \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --output-file parsed_mission.json

      - name: Fail loudly if mission type is ambiguous
        if: steps.parse.outputs.mission_type == 'AMBIGUOUS'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Could not deterministically parse this issue as a known mission type.\n\nExpected formats:\n- `Complete intake for [NAME] — repo: [URL]`\n- `Genesis: [NAME] — [brief]`\n\nNo chain has been activated. Please reformat and reopen, or edit this issue."
            })

  execute-intake:
    needs: detect-mission
    if: needs.detect-mission.outputs.mission_type == 'INTAKE'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Label issue as intake mission
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['mission:intake', 'status:in-progress', 'chain:v1-reduced']
            })

      - name: Run Team 1 intake chain (v1 reduced)
        id: intake
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/run_intake_chain.py \
            --platform-name "${{ needs.detect-mission.outputs.platform_name }}" \
            --repo-url "${{ needs.detect-mission.outputs.repo_url }}" \
            --issue-number "${{ needs.detect-mission.outputs.issue_number }}" \
            2>&1 | tee intake_run_output.log

      - name: Commit artefacts
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          ISSUE_NUMBER: ${{ needs.detect-mission.outputs.issue_number }}
        run: |
          git config user.name "SeierTech EMS"
          git config user.email "ems@seiertech.com"
          git add "platforms/${PLATFORM_NAME}" || true
          git commit -m "EMS: v1 intake DRAFT for ${PLATFORM_NAME} [Issue #${ISSUE_NUMBER}] — requires human review" || echo "Nothing to commit"
          git push

      - name: Comment honest status on issue
        uses: actions/github-script@v7
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
        with:
          script: |
            const platformName = process.env.PLATFORM_NAME;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              body: `## EMS v1 Intake Chain — DRAFT Output\n\n**Platform:** ${platformName}\n**Status:** DRAFT — requires human review\n\nThis ran a v1 REDUCED chain (grouped persona passes, Standards Engineer gated) — not yet the full 25-persona depth. See \`platforms/${platformName}/INTAKE_RUN_LOG.md\` for honest scope disclosure and what was actually executed.\n\n**This is not yet a certified READY platform.** Review the draft artefacts before proceeding to forward missions.\n\n*SeierTech EMS — Loop Engineering*`
            })

      - name: Update status label
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ needs.detect-mission.outputs.issue_number }},
                name: 'status:in-progress'
              });
            } catch (e) { console.log('Label removal skipped:', e.message); }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['status:draft-needs-review']
            });

  execute-genesis:
    needs: detect-mission
    if: needs.detect-mission.outputs.mission_type == 'GENESIS'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Comment — genesis not yet operationalised
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['mission:genesis', 'status:not-yet-implemented']
            })
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              body: "MISSION-000 Genesis chain is designed (OPR-000011, MSN-000000, Team 2 personas) but the executable GitHub Actions job for genesis is **not yet built** — only the intake chain (v1 reduced) has a working executor.\n\nThis issue is correctly classified as GENESIS but no automated chain ran. Genesis execution is the next workflow to build.\n\n*SeierTech EMS — honest status reporting*"
            })

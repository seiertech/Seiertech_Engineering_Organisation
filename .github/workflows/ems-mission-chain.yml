name: EMS Mission Chain

# HONEST STATUS (see IMPLEMENTATION_STATUS.md for full ledger):
# v2 — intake chain (brownfield, MISSION-001) does: real shallow clone + file
# walk (scan_repo.py), grouped persona passes (19 as of DAM-000011), MTS
# synthesis, and a REAL deterministic readiness gate check
# (check_readiness_gates.py) — not an LLM self-assessment.
#
# v1 — genesis chain (greenfield, MISSION-000): grouped DESIGN-mode persona
# passes (fewer than intake's, since there's no repo to scan) + MTS
# synthesis + the same real gate check used for brownfield.
#
# v1 — BUILD chain (forward, any platform that has reached READY): Proposal
# -> TDA -> EDP -> Verification -> Release, each gated. A RELEASE decision
# triggers cross-repo delivery (a real PR in the target repo containing the
# EDP as a committed proposal, NOT applied code).
#
# TERMINAL STATE MODEL (per DAM-000013, responding to external feedback that
# every distinct outcome — READY, BLOCKED, halted-at-TDA, HOLD, REJECT,
# delivered, delivery-failed, ambiguous — was collapsing into one flat
# 'status:draft-needs-review' label, making the issue tracker unable to
# distinguish a genuine success from a genuine dead end at a glance):
#
#   status:ambiguous-mission      — parse failed, issue needs reformatting
#   status:blocked                — chain ran, platform genuinely not ready
#                                    (a gate beyond the known RG-008 ceiling failed)
#   status:draft-needs-review     — chain ran, hit the honest current ceiling
#                                    (only RG-008 failing — the expected best
#                                    outcome until Founder Questions exists)
#   status:halted-at-tda          — BUILD stopped because TDA returned
#                                    REJECTED or REVISION_REQUIRED
#   status:release-hold           — BUILD reached Release, decision was HOLD
#   status:release-rejected       — BUILD reached Release, decision was REJECT
#   status:released-not-delivered — BUILD reached RELEASE but cross-repo
#                                    delivery failed or TARGET_REPO_TOKEN
#                                    is not configured
#   status:delivered-to-target    — BUILD reached RELEASE and a real PR now
#                                    exists in the target platform repo
#
# Deliberately NOT included: status:complete. Per EMS_OPERATING_MODEL.md
# Section 5, a mission is only formally COMPLETE once OPR-000008 Knowledge
# Capture has executed — that operation has no executor yet (it remains a
# human/founder-driven step today). Labelling something status:complete
# here would overclaim a closure this workflow cannot actually back up.
#
# STILL NOT DONE: full 25-persona individual depth for any chain, .ems/
# creation in the TARGET platform repo, Founder Questions mechanism
# (RG-008, all origins), and REHAB/STRATEGIC/AGENTIC_INSERTION/SPEC/
# PROPOSAL mission executors.

on:
  issues:
    types: [opened, edited]
  # NOTE: issue_comment trigger deliberately EXCLUDED.
  # Adding it would re-fire the full chain on every comment posted on a mission
  # issue — including the bot's own status comments, creating an infinite loop.
  # The safer upgrade path: add it back with a condition like
  #   github.actor != 'github-actions[bot]' and github.actor != 'SeierTech-EMS'
  # once a bot actor name is established. For now, issues can be re-edited to
  # re-trigger re-parsing, which is sufficient for v1 baseline.

jobs:
  detect-mission:
    runs-on: ubuntu-latest
    outputs:
      mission_type: ${{ steps.parse.outputs.mission_type }}
      platform_name: ${{ steps.parse.outputs.platform_name }}
      repo_url: ${{ steps.parse.outputs.repo_url }}
      brief: ${{ steps.parse.outputs.brief }}
      instruction: ${{ steps.parse.outputs.instruction }}
      issue_number: ${{ github.event.issue.number }}

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse issue deterministically
        id: parse
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 .github/scripts/issue_parser.py \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --output-file parsed_mission.json

      - name: Label and comment if mission type is ambiguous
        if: steps.parse.outputs.mission_type == 'AMBIGUOUS'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status:ambiguous-mission']
            })
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Could not deterministically parse this issue as a known mission type.\n\nExpected formats:\n- `Complete intake for [NAME] — repo: [URL]`\n- `Genesis: [NAME] — [brief]`\n- `Build for [NAME] — [instruction]`\n\nNo chain has been activated. This issue has been labelled `status:ambiguous-mission` so it doesn't silently sit unlabelled — please reformat and reopen, or edit this issue and it will be re-parsed."
            })

  execute-intake:
    needs: detect-mission
    if: needs.detect-mission.outputs.mission_type == 'INTAKE'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Label issue as intake mission
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['mission:intake', 'status:in-progress', 'chain:v2']
            })

      - name: Run Team 1 intake chain
        id: intake
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/run_intake_chain.py \
            --platform-name "${{ needs.detect-mission.outputs.platform_name }}" \
            --repo-url "${{ needs.detect-mission.outputs.repo_url }}" \
            --issue-number "${{ needs.detect-mission.outputs.issue_number }}" \
            2>&1 | tee intake_run_output.log

      - name: Read gate check result
        id: gates
        if: always()
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
        run: |
          GATE_FILE="platforms/${PLATFORM_NAME}/READINESS_GATE_RESULT.json"
          if [ -f "$GATE_FILE" ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('$GATE_FILE')).get('overall_status','UNKNOWN'))")
            FAILING=$(python3 -c "import json; print(','.join(json.load(open('$GATE_FILE')).get('failing_gates',[])))")
          else
            STATUS="UNKNOWN — gate check did not run"
            FAILING="N/A"
          fi
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          echo "failing=${FAILING}" >> $GITHUB_OUTPUT

      - name: Commit artefacts
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          ISSUE_NUMBER: ${{ needs.detect-mission.outputs.issue_number }}
          GATE_STATUS: ${{ steps.gates.outputs.status }}
        run: |
          git config user.name "SeierTech EMS"
          git config user.email "ems@seiertech.com"
          git add "platforms/${PLATFORM_NAME}" || true
          git commit -m "EMS: intake run for ${PLATFORM_NAME} [Issue #${ISSUE_NUMBER}] — gate status: ${GATE_STATUS}" || echo "Nothing to commit"
          git push

      - name: Comment honest status on issue
        uses: actions/github-script@v7
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          GATE_STATUS: ${{ steps.gates.outputs.status }}
          FAILING_GATES: ${{ steps.gates.outputs.failing }}
        with:
          script: |
            const platformName = process.env.PLATFORM_NAME;
            const gateStatus = process.env.GATE_STATUS;
            const failingGates = process.env.FAILING_GATES;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              body: `## EMS Intake Chain — Result\n\n**Platform:** ${platformName}\n**Readiness Status:** ${gateStatus}\n**Failing/incomplete gates:** ${failingGates}\n\nThis ran a real shallow clone + file walk, grouped persona passes, MTS synthesis, and a real deterministic readiness gate check (not LLM self-assessment). See \`platforms/${platformName}/INTAKE_RUN_LOG.md\` and \`READINESS_GATE_RESULT.json\` for full detail.\n\nKnown gaps (RG-008 Founder Questions, .ems/ creation in target repo, full 25-persona depth) are tracked in IMPLEMENTATION_STATUS.md and will correctly show as N/A or failing rather than being silently skipped.\n\n*SeierTech EMS — Loop Engineering*`
            })

      - name: Update status label
        if: always()
        uses: actions/github-script@v7
        env:
          FAILING_GATES: ${{ steps.gates.outputs.failing }}
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ needs.detect-mission.outputs.issue_number }},
                name: 'status:in-progress'
              });
            } catch (e) { console.log('Label removal skipped:', e.message); }
            const raw = process.env.FAILING_GATES || '';
            const failingGates = raw.split(',').map(g => g.trim()).filter(g => g && g !== 'N/A');
            const onlyRG008 = failingGates.length === 1 && failingGates[0] === 'RG-008';
            const noFailures = failingGates.length === 0;
            // If gates step produced N/A (chain failed, file never written),
            // noFailures is true — but raw being 'N/A' is filtered out, so
            // failingGates.length === 0, which normally means "all passed."
            // Distinguish: if raw is exactly 'N/A' or empty, chain may have failed.
            // Map that to status:blocked, not status:draft-needs-review.
            const chainFailed = !raw || raw.trim() === 'N/A';
            let label;
            if (chainFailed) {
              label = 'status:blocked';
            } else {
              label = (noFailures || onlyRG008) ? 'status:draft-needs-review' : 'status:blocked';
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: [label]
            });

  execute-genesis:
    needs: detect-mission
    if: needs.detect-mission.outputs.mission_type == 'GENESIS'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Label issue as genesis mission
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['mission:genesis', 'status:in-progress', 'chain:v1']
            })

      - name: Run Team 2 genesis chain
        id: genesis
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
        run: |
          python3 .github/scripts/run_genesis_chain.py \
            --platform-name "${{ needs.detect-mission.outputs.platform_name }}" \
            --brief "${{ needs.detect-mission.outputs.brief }}" \
            --issue-number "${{ needs.detect-mission.outputs.issue_number }}" \
            2>&1 | tee genesis_run_output.log

      - name: Read gate check result
        id: gates
        if: always()
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
        run: |
          GATE_FILE="platforms/${PLATFORM_NAME}/READINESS_GATE_RESULT.json"
          if [ -f "$GATE_FILE" ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('$GATE_FILE')).get('overall_status','UNKNOWN'))")
            FAILING=$(python3 -c "import json; print(','.join(json.load(open('$GATE_FILE')).get('failing_gates',[])))")
          else
            STATUS="UNKNOWN — gate check did not run"
            FAILING="N/A"
          fi
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          echo "failing=${FAILING}" >> $GITHUB_OUTPUT

      - name: Commit artefacts
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          ISSUE_NUMBER: ${{ needs.detect-mission.outputs.issue_number }}
          GATE_STATUS: ${{ steps.gates.outputs.status }}
        run: |
          git config user.name "SeierTech EMS"
          git config user.email "ems@seiertech.com"
          git add "platforms/${PLATFORM_NAME}" || true
          git commit -m "EMS: genesis run for ${PLATFORM_NAME} [Issue #${ISSUE_NUMBER}] — gate status: ${GATE_STATUS}" || echo "Nothing to commit"
          git push

      - name: Comment honest status on issue
        uses: actions/github-script@v7
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          GATE_STATUS: ${{ steps.gates.outputs.status }}
          FAILING_GATES: ${{ steps.gates.outputs.failing }}
        with:
          script: |
            const platformName = process.env.PLATFORM_NAME;
            const gateStatus = process.env.GATE_STATUS;
            const failingGates = process.env.FAILING_GATES;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              body: `## EMS Genesis Chain — Result\n\n**Platform:** ${platformName}\n**Origin:** MISSION-000 Platform Genesis (greenfield — designed forward from brief, no prior codebase)\n**Readiness Status:** ${gateStatus}\n**Failing/incomplete gates:** ${failingGates}\n\nThis ran grouped DESIGN-mode persona passes, MTS synthesis, and the same real deterministic readiness gate check used for brownfield intake. See \`platforms/${platformName}/GENESIS_RUN_LOG.md\` and \`READINESS_GATE_RESULT.json\` for full detail.\n\nKnown gaps (RG-008 Founder Questions, no actual GitHub repo created yet, full 25-persona depth) are tracked in IMPLEMENTATION_STATUS.md.\n\n*SeierTech EMS — Loop Engineering*`
            })

      - name: Update status label
        if: always()
        uses: actions/github-script@v7
        env:
          FAILING_GATES: ${{ steps.gates.outputs.failing }}
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ needs.detect-mission.outputs.issue_number }},
                name: 'status:in-progress'
              });
            } catch (e) { console.log('Label removal skipped:', e.message); }
            const raw = process.env.FAILING_GATES || '';
            const failingGates = raw.split(',').map(g => g.trim()).filter(g => g && g !== 'N/A');
            const onlyRG008 = failingGates.length === 1 && failingGates[0] === 'RG-008';
            const noFailures = failingGates.length === 0;
            const chainFailed = !raw || raw.trim() === 'N/A';
            let label;
            if (chainFailed) {
              label = 'status:blocked';
            } else {
              label = (noFailures || onlyRG008) ? 'status:draft-needs-review' : 'status:blocked';
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: [label]
            });

  execute-build:
    needs: detect-mission
    if: needs.detect-mission.outputs.mission_type == 'BUILD'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EMS repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Label issue as build mission
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: ['mission:build', 'status:in-progress', 'chain:v1']
            })

      - name: Run Team 2 BUILD chain
        id: build
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
        run: |
          python3 .github/scripts/run_build_chain.py \
            --platform-name "${{ needs.detect-mission.outputs.platform_name }}" \
            --instruction "${{ needs.detect-mission.outputs.instruction }}" \
            --issue-number "${{ needs.detect-mission.outputs.issue_number }}" \
            2>&1 | tee build_run_output.log

      - name: Read build result
        id: result
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          ISSUE_NUMBER: ${{ needs.detect-mission.outputs.issue_number }}
        run: |
          LOG_FILE="platforms/${PLATFORM_NAME}/BUILD_RUN_LOG_${ISSUE_NUMBER}.md"
          if [ -f "$LOG_FILE" ]; then
            STATUS=$(grep -m1 "Final Status" "$LOG_FILE" | sed 's/.*| //;s/ |//')
          else
            STATUS="UNKNOWN — run log not produced"
          fi
          echo "status=${STATUS}" >> $GITHUB_OUTPUT

      - name: Deliver to target repo (only if RELEASE)
        if: steps.result.outputs.status == 'RELEASE'
        id: deliver
        continue-on-error: true
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          ISSUE_NUMBER: ${{ needs.detect-mission.outputs.issue_number }}
        run: |
          python3 .github/scripts/deliver_to_target_repo.py \
            --platform-name "${PLATFORM_NAME}" \
            --issue-number "${ISSUE_NUMBER}" \
            2>&1 | tee delivery_output.log

      - name: Commit artefacts
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          ISSUE_NUMBER: ${{ needs.detect-mission.outputs.issue_number }}
          BUILD_STATUS: ${{ steps.result.outputs.status }}
        run: |
          git config user.name "SeierTech EMS"
          git config user.email "ems@seiertech.com"
          git add "platforms/${PLATFORM_NAME}" "memory/missions" || true
          git commit -m "EMS: BUILD run for ${PLATFORM_NAME} [Issue #${ISSUE_NUMBER}] — status: ${BUILD_STATUS}" || echo "Nothing to commit"
          git push

      - name: Comment honest status on issue
        uses: actions/github-script@v7
        env:
          PLATFORM_NAME: ${{ needs.detect-mission.outputs.platform_name }}
          BUILD_STATUS: ${{ steps.result.outputs.status }}
          ISSUE_NUMBER: ${{ needs.detect-mission.outputs.issue_number }}
          DELIVER_OUTCOME: ${{ steps.deliver.outcome }}
        with:
          script: |
            const platformName = process.env.PLATFORM_NAME;
            const buildStatus = process.env.BUILD_STATUS;
            const issueNumber = process.env.ISSUE_NUMBER;
            const deliverOutcome = process.env.DELIVER_OUTCOME || 'skipped';
            let deliveryNote = '';
            if (buildStatus === 'RELEASE') {
              deliveryNote = deliverOutcome === 'success'
                ? '\n\n**Delivery:** a real branch and Pull Request were created in the target platform repo, containing the Engineering Delivery Package as a committed proposal — not applied code. See `_BUILD_DELIVERY_LATEST.md`.'
                : '\n\n**Delivery:** RELEASE was reached but cross-repo delivery did not complete (TARGET_REPO_TOKEN missing or the delivery step failed). The mission output exists in this repo but nothing was pushed to the target platform yet — see PLATFORM_ONBOARDING_CHECKLIST.md.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              body: `## EMS BUILD Chain — Result\n\n**Platform:** ${platformName}\n**Final Status:** ${buildStatus}${deliveryNote}\n\nThis ran the Team 2 forward mission executor — Proposal, Technical Design Authority, Engineering Delivery Package, Verification, and Release Scorecard, each gated by a real Standards Engineer call. See \`platforms/${platformName}/BUILD_RUN_LOG_${issueNumber}.md\` for full detail.\n\nA TDA verdict of REJECTED or REVISION_REQUIRED halts the chain at that point — this is doctrine working correctly, not a script failure.\n\n*SeierTech EMS — Loop Engineering*`
            })

      - name: Update status label
        if: always()
        uses: actions/github-script@v7
        env:
          BUILD_STATUS: ${{ steps.result.outputs.status }}
          DELIVER_OUTCOME: ${{ steps.deliver.outcome }}
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ needs.detect-mission.outputs.issue_number }},
                name: 'status:in-progress'
              });
            } catch (e) { console.log('Label removal skipped:', e.message); }

            const buildStatus = process.env.BUILD_STATUS || '';
            const deliverOutcome = process.env.DELIVER_OUTCOME || '';
            let label;
            if (buildStatus.startsWith('HALTED_AT_TDA')) {
              label = 'status:halted-at-tda';
            } else if (buildStatus === 'HOLD') {
              label = 'status:release-hold';
            } else if (buildStatus === 'REJECT') {
              label = 'status:release-rejected';
            } else if (buildStatus === 'RELEASE') {
              label = (deliverOutcome === 'success') ? 'status:delivered-to-target' : 'status:released-not-delivered';
            } else {
              label = 'status:blocked';
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.detect-mission.outputs.issue_number }},
              labels: [label]
            });
